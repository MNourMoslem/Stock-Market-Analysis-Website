
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="stockChart" width="{{ graph_width }}" height="{{ graph_height }}"></canvas>

<script>
    // Retrieve the stock data and chart config from the Django context
    const stockData = {{ stock_data|safe }};  // Pass the stock data as a safe JSON object
    const chartConfig = {{ chart_config|safe }};  // Pass the chart config as a safe JSON object

    // Initialize the chart with the fetched data and config
    const config = {
        type: chartConfig.type,
        data: stockData,
        options: chartConfig.options
    };

    // Create the chart using the canvas element
    new Chart(document.getElementById('stockChart'), config);
</script>
